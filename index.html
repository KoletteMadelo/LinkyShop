  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background: linear-gradient(
        180deg,
        #b8d7ff 0%,
        #f3dce7 100%
      );
    }

    .container{
      text-align:center;
      animation: fadeIn 1s ease;
    }

    .logo-box{
      width:120px;
      height:120px;
      margin:auto;
      border-radius:30px;

      background: linear-gradient(
        135deg,
        #1f75ff,
        #5ca7ff
      );

      display:flex;
      align-items:center;
      justify-content:center;

      box-shadow:
        0 15px 35px rgba(0,0,0,0.12),
        inset 0 2px 8px rgba(255,255,255,0.25);

      animation: spinLoader 4s linear;
    }

    .logo{
      width:62px;
      height:62px;
    }

    .title{
      margin-top:18px;
      font-size:42px;
      font-weight:700;
      color:#2d2d2d;
      letter-spacing:-1px;
    }

    @keyframes spinLoader{
      0%{
        transform: rotate(0deg);
      }
      100%{
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:scale(0.95);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    
    <div class="logo-box">

      <svg class="logo" viewBox="0 0 24 24" fill="none">
        <path d="M10 7H8C5.79086 7 4 8.79086 4 11C4 13.2091 5.79086 15 8 15H10"
          stroke="white"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>

        <path d="M14 7H16C18.2091 7 20 8.79086 20 11C20 13.2091 18.2091 15 16 15H14"
          stroke="white"

          stroke-linecap="round"

          stroke="white"
          stroke-width="2.5"
          stroke-linecap="round"/>

    </div>

    <div class="title">LinkyShop</div>

  </div>

  <script>
    // Redirect after 4 seconds
    setTimeout(() => {
      window.location.href = "https://LinkyShop.lovable.app";
    }, 4000);
  </script>

</body>
